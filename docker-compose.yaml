services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: data_cleaning_backend
    ports:
      - "8000:8000"
    volumes:
      - ./working:/working
      - ./backend:/app/backend
      - ./dataset:/app/dataset
    environment:
      - MODEL_PATH=/working
    # Cài đặt nóng các thư viện missing và khởi động server (Bypass rebuild cực nhanh)
    command: >
      sh -c "pip install --no-cache-dir scikit-learn && 
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data_cleaning_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
