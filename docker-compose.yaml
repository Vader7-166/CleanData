services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: data_cleaning_backend
    ports:
      - "8000:8000"
    volumes:
      - ./working:/working
      - ./backend:/app/backend
      - ./dataset:/app/dataset
      - ./app.db:/app/app.db
    environment:
      - MODEL_PATH=/working
      - DATABASE_URL=sqlite:////app/app.db
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    # Cài đặt nóng các thư viện missing và khởi động server
    command: >
      sh -c "pip install --no-cache-dir scikit-learn pyahocorasick pyvi requests python-dotenv python-multipart openpyxl xlrd && 
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data_cleaning_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
